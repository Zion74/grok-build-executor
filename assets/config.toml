[models]
default = "grok-4.5"
allowed_models = ["grok-4.5"]

[cli]
auto_update = false

[session]
load_envrc = false

[tools]
respect_gitignore = true

[features]
web_fetch = false
tool_search = false

[subagents]
enabled = false

[memory]
enabled = false

[compat.claude]
skills = false
rules = false
agents = false
mcps = false
hooks = false

[compat.cursor]
skills = false
rules = false
agents = false
mcps = false
hooks = false

# Do not auto-pull marketplace plugins into the executor home.
# (Project-root `.mcp.json` is still discovered by Grok when present in the
# worktree — remove unused servers there, e.g. figma-developer-mcp.)
[marketplace]
official_marketplace_auto_installed = false
